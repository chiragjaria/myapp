trigger:
- main

variables:
  acrName: myacrdevcj
  imageName: fastapi-app

stages:
# ================= CI =================
- stage: Build
  displayName: Build & Push Image
  jobs:
  - job: BuildJob
    pool:
      name: aks-agent-pool
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Build image in ACR
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr build \
            --registry $(acrName) \
            --image $(imageName):$(Build.BuildId) \
            --image $(imageName):latest \
            .

    # Publish ONLY the k8s folder, not entire repo
    - task: PublishBuildArtifacts@1
      displayName: Publish k8s manifests
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)/k8s
        artifactName: manifests

# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: DeployToAKS
    pool:
      name: aks-agent-pool
    environment: dev
    variables:
    - group: AKV-Variables   # links to your variable group (DB_HOST, DB_NAME etc.)
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: manifests

          # Fetch secrets from AKV into pipeline variables
          - task: AzureKeyVault@2
            displayName: Fetch secrets from AKV
            inputs:
              azureSubscription: azure-service-connection
              KeyVaultName: your-keyvault-name        # ← change this
              SecretsFilter: 'DB-HOST,DB-NAME,DB-USER,DB-PASS'
              RunAsPreJob: false

          # Inject secrets into the k8s secret object before deploying
          - task: AzureCLI@2
            displayName: Create k8s secret from AKV values
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group your-resource-group \   # ← change this
                  --name your-aks-cluster \                # ← change this
                  --overwrite-existing

                kubectl create secret generic db-secret \
                  --from-literal=DB_HOST=$(DB-HOST) \
                  --from-literal=DB_NAME=$(DB-NAME) \
                  --from-literal=DB_USER=$(DB-USER) \
                  --from-literal=DB_PASS=$(DB-PASS) \
                  --namespace=default \
                  --dry-run=client -o yaml | kubectl apply -f -

          # Deploy using manifests
- task: KubernetesManifest@1
  displayName: Deploy to AKS
  inputs:
    action: deploy
    # remove kubernetesServiceConnection line entirely
    namespace: default
    manifests: |
      $(Pipeline.Workspace)/manifests/deployment.yaml
      $(Pipeline.Workspace)/manifests/service.yaml
    containers: |
      $(acrName).azurecr.io/$(imageName):$(Build.BuildId)
