trigger:
- main

variables:
  imageName: fastapi-app
  acrName: myacrdevcj
  acrLoginServer: myacrdevcj.azurecr.io

stages:

# ================= CI =================
- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildJob
    pool:
      name: vmss-agentpool   # ✅ using your AKS agent

    steps:

    - checkout: self

    # ✅ Build image using ACR (no Docker needed)
    - script: |
        az acr build \
          --registry $(acrName) \
          --image $(imageName):$(Build.BuildId) \
          .
      displayName: Build Image using ACR

    # ✅ Replace image tag in deployment.yaml
    - script: |
        sed -i 's|IMAGE_TAG|$(Build.BuildId)|g' deployment.yaml
      displayName: Replace Image Tag

    # ✅ Publish artifact
    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)
        artifactName: drop


# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      name: aks-agent-pool   # ✅ using your AKS agent

    variables:
    - group: AKV-Variables   # ✅ Key Vault linked

    steps:

    - download: current
      artifact: drop

    # ✅ Inject secrets from AKV
    - script: |
        sed -i 's|POSTGRES_HOST|$(phost)|g' deployment.yaml
        sed -i 's|POSTGRES_USER|$(puser)|g' deployment.yaml
        sed -i 's|POSTGRES_PASSWORD|$(ppassword)|g' deployment.yaml
      displayName: Inject Secrets

    # ✅ Deploy to AKS
    - task: Kubernetes@1
      displayName: Deploy to AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscriptionEndpoint: azure-service-connection
        azureResourceGroup: rgp-dev-mes
        kubernetesCluster: aks-mes-dev
        command: apply
        useConfigurationFile: true
        configuration: |
          deployment.yaml
          service.yaml
