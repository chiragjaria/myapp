trigger:
- main

variables:
  imageName: fastapi-app
  acrLoginServer: myacrdevcj.azurecr.io

stages:

# ================= CI =================
- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildJob
    pool:
      name: aks-agent-pool

    steps:

    - checkout: self

    - script: |
    echo "Skipping dependency install — handled in Dockerfile"
  displayName: Skip Install Step

    - task: Docker@2
      displayName: Build and Push Image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: Dockerfile
        containerRegistry: dregistry
        tags: |
          $(Build.BuildId)

    - script: |
        sed -i 's|IMAGE_TAG|$(Build.BuildId)|g' deployment.yaml
      displayName: Replace Image Tag

    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)
        artifactName: drop


# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      name: aks-agent-pool

    variables:
    - group: AKV-Variables

    steps:

    - download: current
      artifact: drop

    - script: |
        sed -i 's|POSTGRES_HOST|$(phost)|g' deployment.yaml
        sed -i 's|POSTGRES_USER|$(puser)|g' deployment.yaml
        sed -i 's|POSTGRES_PASSWORD|$(ppassword)|g' deployment.yaml
      displayName: Inject Secrets

    - task: Kubernetes@1
      displayName: Deploy to AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscriptionEndpoint: azure-service-connection
        azureResourceGroup: rgp-dev-mes
        kubernetesCluster: aks-mes-dev
        command: apply
        useConfigurationFile: true
        configuration: |
          deployment.yaml
          service.yaml
