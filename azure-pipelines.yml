trigger:
- main

variables:
  imageName: fastapi-app
  acrLoginServer: myacrdevcj.azurecr.io

stages:

# ================= CI =================
- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: BuildJob
    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - script: |
        pip install -r requirements.txt
      displayName: Install Dependencies

    - task: Docker@2
      displayName: Build and Push Image to ACR
      inputs:
        command: buildAndPush
        repository: $(imageName)
        dockerfile: Dockerfile
        containerRegistry: dregistry
        tags: |
          $(Build.BuildId)

    - script: |
        sed -i 's|IMAGE_TAG|$(Build.BuildId)|g' deployment.yaml
      displayName: Replace Image Tag

    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)
        artifactName: drop

# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      vmImage: ubuntu-latest

    variables:
    - group: AKV-Variables   # linked to Azure Key Vault

    steps:

    - download: current
      artifact: drop

    - script: |
        sed -i 's|POSTGRES_HOST|$(phost)|g' deployment.yaml
        sed -i 's|POSTGRES_USER|$(puser)|g' deployment.yaml
        sed -i 's|POSTGRES_PASSWORD|$(ppassword)|g' deployment.yaml
      displayName: Inject Secrets from AKV

    - task: Kubernetes@1
      displayName: Deploy to AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscriptionEndpoint: azure-service-connection
        azureResourceGroup: rgp-dev-mes
        kubernetesCluster: aks-mes-dev
        command: apply
        useConfigurationFile: true
        configuration: |
          deployment.yaml
          service.yaml
