trigger:
- main

variables:
  acrName: myacrdevcj
  imageName: fastapi-app

stages:

# ================= CI =================
- stage: Build
  displayName: Build & Push Image

  jobs:
  - job: BuildJob
    pool:
      name: Azure Pipelines

    variables:
    - group: service-principal   # ✅ your SP variable group

    steps:
    - checkout: self

    # ✅ Manual login + ACR build (no AzureCLI task)
    - script: |
        echo "Logging into Azure..."

        az login --service-principal \
          -u $(AZ_CLIENT_ID) \
          -p $(AZ_CLIENT_SECRET) \
          --tenant $(AZ_TENANT_ID)

        az account set --subscription $(AZ_SUBSCRIPTION_ID)

        echo "Building image in ACR..."

        az acr build \
          --registry $(acrName) \
          --image $(imageName):$(Build.BuildId) \
          --image $(imageName):latest \
          .

      displayName: Login & Build Image via ACR

    # Publish ONLY the k8s folder
    - task: PublishBuildArtifacts@1
      displayName: Publish k8s manifests
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)/k8s
        artifactName: manifests


# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - deployment: DeployToAKS
    pool:
      name: aks-agent-pool

    environment: dev

    variables:
    - group: AKV-Variables
    - group: service-principal   # ✅ needed again for login

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: manifests

          # ✅ Login before AKS operations
          - script: |
              echo "Logging into Azure..."

              az login --service-principal \
                -u $(AZ_CLIENT_ID) \
                -p $(AZ_CLIENT_SECRET) \
                --tenant $(AZ_TENANT_ID)

              az account set --subscription $(AZ_SUBSCRIPTION_ID)
            displayName: Azure Login

          # ✅ Get AKS credentials
          - script: |
              az aks get-credentials \
                --resource-group rgp-dev-mes \
                --name aks-mes-dev \
                --overwrite-existing
            displayName: Get AKS Credentials

          # ✅ Create/Update Kubernetes secret
          - script: |
              kubectl create secret generic db-secret \
                --from-literal=DB_HOST=$(phost) \
                --from-literal=DB_NAME=$(pdb) \
                --from-literal=DB_USER=$(puser) \
                --from-literal=DB_PASS=$(ppassword) \
                --namespace=default \
                --dry-run=client -o yaml | kubectl apply -f -
            displayName: Create DB Secret

          # ✅ Deploy application
          - task: KubernetesManifest@1
            displayName: Deploy to AKS
            inputs:
              action: deploy
              namespace: default
              manifests: |
                $(Pipeline.Workspace)/manifests/deployment.yaml
                $(Pipeline.Workspace)/manifests/service.yaml
              containers: |
                $(acrName).azurecr.io/$(imageName):$(Build.BuildId)
