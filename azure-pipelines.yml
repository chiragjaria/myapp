trigger:
- main

variables:
  acrName: myacrdevcj
  imageName: fastapi-app

stages:

# ================= CI =================
- stage: Build
  displayName: Build Image

  jobs:
  - job: BuildJob
    pool:
      name: aks-agent-pool

    steps:

    - checkout: self

    # 🔥 Build image in ACR (no Docker needed)
    - task: AzureCLI@2
      displayName: Build Image in ACR
      inputs:
        azureSubscription: azure-service-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr build \
            --registry $(acrName) \
            --image $(imageName):$(Build.BuildId) \
            --image $(imageName):latest \
            .

    # 🔥 Publish only manifests (not full repo)
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: $(System.DefaultWorkingDirectory)
        artifactName: manifests

# ================= CD =================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build

  jobs:
  - deployment: DeployToAKS
    pool:
      name: aks-agent-pool

    environment: dev   # 🔥 adds approvals later

    variables:
    - group: AKV-Variables

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: manifests

          # 🔥 Inject image dynamically (no sed mess)
          - task: KubernetesManifest@0
            displayName: Deploy to AKS
            inputs:
              action: deploy
              kubernetesServiceConnection: azure-service-connection
              namespace: default
              manifests: |
                deployment.yaml
                service.yaml
              containers: |
                myacrdevcj.azurecr.io/fastapi-app:$(Build.BuildId)
